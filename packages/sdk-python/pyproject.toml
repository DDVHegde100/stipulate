[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "stipulate"
version = "0.1.0"
description = "Official Python client for the Stipulate card benefit API"
readme = "README.md"
requires-python = ">=3.10"
dependencies = []

[project.optional-dependencies]
dev = ["pytest>=8.0"]

[tool.setuptools.packages.find]
where = ["."]
include = ["stipulate*"]

[tool.pytest.ini_options]
testpaths = ["tests"]

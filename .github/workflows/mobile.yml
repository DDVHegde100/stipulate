name: Mobile

on:
  push:
    branches: [main, staging]
  pull_request:
    branches: [main, staging]

jobs:
  typecheck:
    name: mobile typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @stipulate/mobile typecheck

  eas-preview:
    name: eas preview build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [typecheck]
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - run: pnpm install --frozen-lockfile

      - name: EAS build preview (iOS simulator)
        working-directory: apps/mobile
        run: |
          if [ -n "${{ secrets.EXPO_TOKEN }}" ]; then
            eas build --platform ios --profile preview --non-interactive --no-wait
          else
            echo "EXPO_TOKEN not configured — skipping EAS build"
          fi

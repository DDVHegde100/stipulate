name: Schedule Reparse

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  reparse:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Run scheduled reparse
        run: pnpm --filter @stipulate/api schedule:reparse
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          REDIS_URL: ${{ secrets.REDIS_URL }}
          NODE_ENV: production
          REPARSE_LIMIT: 100
          REPARSE_CONCURRENCY: 3

name: Workers Staging

on:
  push:
    branches: [staging]
  workflow_dispatch:

jobs:
  deploy-workers:
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @stipulate/api build

      - name: Deploy worker supervisor to Fly.io
        run: |
          if [ -n "${{ secrets.FLY_API_TOKEN }}" ]; then
            flyctl deploy --config apps/api/fly.worker.toml --dockerfile apps/api/Dockerfile --remote-only --app stipulate-workers-staging
          else
            echo "FLY_API_TOKEN not configured — skipping worker deploy"
          fi
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

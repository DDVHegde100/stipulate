name: Python SDK

on:
  push:
    branches: [main, staging]
  pull_request:
    branches: [main, staging]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install package
        working-directory: packages/sdk-python
        run: pip install -e ".[dev]"

      - name: Run pytest
        working-directory: packages/sdk-python
        run: pytest -q

name: Deploy Staging

on:
  push:
    branches: [staging]

concurrency:
  group: deploy-staging
  cancel-in-progress: false

jobs:
  deploy-api:
    name: deploy api (staging)
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm build --filter=@stipulate/api

      - name: Build API Docker image
        run: docker build -f apps/api/Dockerfile -t stipulate-api:staging .

      - name: Deploy to Fly.io staging
        run: |
          if [ -n "${{ secrets.FLY_API_TOKEN }}" ]; then
            flyctl deploy --config apps/api/fly.toml --dockerfile apps/api/Dockerfile --remote-only --app stipulate-api-staging
          else
            echo "FLY_API_TOKEN not configured — skipping deploy"
          fi
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

  deploy-web:
    name: deploy web (staging)
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm build --filter=@stipulate/web
        env:
          NEXT_PUBLIC_API_URL: https://api.staging.stipulate.io

      - name: Deploy placeholder
        run: echo "Configure Vercel deploy here"

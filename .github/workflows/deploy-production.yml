name: Deploy Production

on:
  push:
    tags:
      - 'v*.*.*'

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    name: deploy production
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm build
        env:
          NODE_ENV: production
          NEXT_PUBLIC_API_URL: https://api.stipulate.io

      - name: Build API Docker image
        run: docker build -f apps/api/Dockerfile -t stipulate-api:${{ github.ref_name }} .

      - name: Deploy to Fly.io
        run: |
          if [ -n "${{ secrets.FLY_API_TOKEN }}" ]; then
            flyctl deploy --config apps/api/fly.toml --dockerfile apps/api/Dockerfile --remote-only
          else
            echo "FLY_API_TOKEN not configured — skipping deploy"
          fi
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          draft: false
          prerelease: false

      - name: Deploy placeholder
        run: echo "Configure production deploy targets here"
